<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediRx - View Prescription</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap" rel="stylesheet">
    <!-- Loaded Noto Sans Devanagari for perfect universal cross-device Marathi rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            position: relative;
            min-height: 100vh; 
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background: linear-gradient(135deg, #2e1065 0%, #701a75 40%, #fbcfe8 100%);
            background-size: cover;
            background-attachment: fixed;
            line-height: 1.6;
            color: #111111;
        }

        /* GLASS NAVBAR OVERLAY */
        .navbar { 
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 1rem 2rem; 
            border-radius: 20px; 
            margin-bottom: 2rem; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 5.8in;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-title {
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-back-btn {
            padding: 0.5rem 1.2rem; 
            font-size: 0.9rem; 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            text-decoration: none; 
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-back-btn:hover {
            background: #ffffff;
            color: #7028e4;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .main-container { 
            max-width: 5.8in; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* CLEAN PROFESSIONAL SLIP SHEET CONTAINER */
        .prescription-container {
            background: #ffffff !important;
            width: 5.8in; 
            max-width: 100%; 
            min-height: 8.3in;
            padding: 0.6in 0.5in;
            margin-bottom: 2rem;
            font-family: 'Times New Roman', Times, serif;
            font-size: 12px;
            line-height: 1.4;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            position: relative;
            color: #222222;
            border-radius: 12px; 
            display: block; 
        }

        /* 4 TO 5 LINES LETTERHEAD SPACING SYSTEM */
        .letterhead-space {
            height: 1.0in; 
            margin-bottom: 1.0rem;
        }

        /* FORMAL MINIMALIST PRESCRIPTION MARKUPS */
        .prescription-header {
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem; 
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .clinic-brand {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #111111;
        }

        .date-display {
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        /* PATIENT METADATA DISPLAY WITH LARGER FONTS & SPACING ADJUSTMENTS */
        .patient-meta-inline {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.8rem; 
            font-size: 17px; 
            padding-bottom: 0.4rem;
            gap: 10px;
        }

        .patient-name-wrapper {
            padding-left: 1.7rem; 
        }

        .patient-mrd-wrapper {
            padding-right: 1.7rem; 
            text-align: right;
        }

        .meta-label {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 15px; 
            color: #444444;
        }

        .section-title { 
            font-weight: bold; 
            margin: 2rem 0 0.8rem 0; 
            color: #111111; 
            font-size: 17px; 
            text-transform: uppercase;
            padding-bottom: 2px;
            letter-spacing: 0.5px;
        }

        /* HORIZONTAL LAB LAYOUT WITH CUSTOM ASYMMETRICAL MARGINS (TAB EDITS) */
        .lab-horizontal-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.8rem; 
            font-size: 16px;
            font-style: bold;
            padding: 0.2rem 0;
            gap: 10px;
        }

        .lab-hc-wrap {
            margin-left: 2.5rem; 
            text-decoration: left;
        }

        .lab-vitd-wrap {
            margin-right: 2.5rem; 
            text-align: right;
        }

        /* MEDICATION TEXT CONTAINER LAYOUT */
        .medications-block {
            margin-bottom: 1.2rem;
        }

        .medication-entry {
            margin-bottom: 0.8rem; 
            line-height: 1.5;
            font-size: 13px;
        }

        /* Custom alignment layout wrapper for un-bulleted text extensions */
        .medication-entry-indent {
            margin-bottom: 0.8rem;
            line-height: 1.5;
            padding-left: 1.2rem; 
            font-size: 13px;
        }

        /* Inline styling rule for clean, localized Marathi visibility */
        .marathi-text {
            font-family: 'Noto Sans Devanagari', sans-serif;
            color: #444444;
            font-size: 12.5px;
            margin-left: 4px;
        }

        .value-highlight {
            font-weight: bold;
            color: #000000;
        }

        /* ANNUAL TARGET FOLLOWUP PARAGRAPH SPECIFICATION */
        .annual-followup-statement {
            font-size: 13px;
            line-height: 1.5;
            margin-top: 1.5rem;
            font-weight: bold;
            color: #111111;
        }

        .footer { 
            position: absolute; 
            bottom: 0.4in; 
            left: 0.5in;
            right: 0.5in;
            font-size: 10px; 
            color: #777777; 
            border-top: 1px solid #eeeeee;
            padding-top: 4px;
            display: flex;
            justify-content: space-between;
        }

        /* GLASS LAYOUT ACTION BUTTONS */
        .action-buttons { 
            display: flex; 
            gap: 1rem; 
            justify-content: center; 
            flex-wrap: wrap; 
            max-width: 5.8in; 
            width: 100%;
            margin-bottom: 3rem;
        }

        .btn { 
            padding: 1rem 1.5rem; 
            border: none; 
            border-radius: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            text-decoration: none; 
            font-size: 0.95rem; 
        }

        .btn-primary { 
            background: #ffffff; 
            color: #7028e4; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .btn-primary:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            background: #fdfdfd;
        }

        .btn-secondary { 
            background: rgba(255, 255, 255, 0.15); 
            color: white; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* HARDWARE SYSTEM PRINT OVERRIDES */
        @media print {
            body { 
                background: none !important; 
                padding: 0 !important; 
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                min-height: 100vh !important;
                width: 100% !important;
            }
            .main-container {
                width: 100% !important;
                max-width: 100% !important;
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
            }
            .prescription-container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 5.8in !important; 
                max-width: 5.8in !important;
                height: 8.3in !important; 
                padding: 0.4in 0.4in !important; 
                margin: 0 auto !important; 
                position: relative !important; 
                border-radius: 0px !important;
                display: block !important; 
                zoom: 0.9 !important;               /* Force 90% scale sizing */
                transform: scale(0.9) !important;   /* Alternate engine scale fallback */
                transform-origin: top center !important;
            }
            .action-buttons, .navbar { 
                display: none !important; 
            }
            @page { 
                size: A4;                           /* Changed paper layout target to A4 */
                margin: 0; 
            }
        }

        @media (max-width: 768px) {
            .main-container, .navbar { 
                max-width: 100%; 
            }
            .prescription-container { 
                width: 100%; 
                min-height: auto; 
                padding: 0.4in 0.3in; 
                font-size: 14px; 
            }
            .patient-meta-inline, .lab-horizontal-row {
                flex-direction: column;
                justify-content: flex-start;
                gap: 0.4rem;
            }
            .patient-name-wrapper, .lab-hc-wrap {
                padding-left: 0;
                margin-left: 0;
            }
            .patient-mrd-wrapper, .lab-vitd-wrap {
                padding-right: 0;
                margin-right: 0;
                text-align: left;
            }
            .footer {
                position: relative;
                bottom: auto;
                left: auto;
                right: auto;
                margin-top: 2rem;
                flex-direction: column;
                gap: 0.5rem;
            }
            .action-buttons { 
                flex-direction: column; 
                width: 100%;
            }
            .btn { 
                width: 100%; 
                justify-content: center; 
            }
        }
    </style>
</head>
<body>

    <!-- OVERLAY NAV -->
    <nav class="navbar">
        <div class="navbar-title"><i class="fas fa-eye"></i> View Slip</div>
        <a href="ipd.html" class="nav-back-btn">
            <i class="fas fa-arrow-left"></i> History Records
        </a>
    </nav>

    <div class="main-container">
        <!-- WHITE PRINT SLIP CONTAINER -->
        <div id="prescriptionContent" class="prescription-container">
            
            <!-- RESERVED LETTERHEAD SPACE -->
            <div class="letterhead-space"></div>
            
            <div class="prescription-header">
                <div class="clinic-brand"> </div>
                <div class="date-display">Date: <span id="prescriptionDate">-</span></div>
            </div><br>
            
            <!-- Patient details styled with custom spacing alignments and fixed size jumps -->
            <div class="patient-meta-inline">
                <div class="patient-name-wrapper"><span class="meta-label">Patient Name:</span> <span id="patientName" style="font-weight: bold; font-size: 18px;">-</span></div>
                <div class="patient-mrd-wrapper"><span class="meta-label">MRD No:</span> <span id="prescriptionMrd" style="font-weight: bold; font-size: 18px;">-</span></div>
            </div>

            <!-- Lab Results Row with padding elements replicating custom tab markers -->
            <div class="section-title"></div>
            <div class="lab-horizontal-row">
                <div class="lab-hc-wrap">HC: <span id="labHc" class="value-highlight">-</span></div>
                <div>Fe: <span id="labFe" class="value-highlight">-</span></div>
                <div class="lab-vitd-wrap">Vit D: <span id="labVitD" class="value-highlight">-</span></div>
            </div>

            <!-- Medications Listing -->
            <div class="section-title"></div>
            <div id="medicationRows" class="medications-block">
                <div style="color: #666;">Processing metrics...</div>
            </div>

            <!-- SYSTEM INJECTED STATEMENT (GENERATED AT THE END OF MEDICATION FLOWS) -->
            <div id="followupStatement" class="annual-followup-statement">
                Annuals follow up with 1) Serum Homocystine and Ferritin 2) X ray <span id="outShoulder">Left</span> Shoulder TRUE AP and AXIAL view On <span id="outDate">30 oct</span> every year for follow up </div>

            <div class="footer">
                <div>Printed: <span id="generatedTime">-</span></div>
            </div>
        </div>

        <!-- Glass Actions Container -->
        <div id="actionBlock" class="action-buttons">
            <button onclick="printCurrent()" class="btn btn-primary">
                <i class="fas fa-print"></i> Print Document (A4)
            </button>
            <a href="ipdgenerate.html" class="btn btn-secondary">
                <i class="fas fa-plus"></i> New Sheet
            </a>
            <a href="ipd.html" class="btn btn-secondary">
                <i class="fas fa-list"></i> View History
            </a>
        </div>
    </div>

    <script>
        let cachedPrescriptionRecord = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Core processing of existing pipeline values
            loadDataFromMemory();
            
            // Instantly render layout using storage objects
            if (cachedPrescriptionRecord) {
                // Prioritize explicit object properties from creation layout, fallback to global inputs if reading historical rows
                const targetShoulder = cachedPrescriptionRecord.shoulderValue || cachedPrescriptionRecord.shoulder || localStorage.getItem('selectShoulder') || "Left";
                const targetRawDate = cachedPrescriptionRecord.annualFollowUpDate && cachedPrescriptionRecord.annualFollowUpDate !== 'N/A' ? cachedPrescriptionRecord.annualFollowUpDate : localStorage.getItem('selectDate');

                let formattedDateStr = "30 oct";
                if (targetRawDate && targetRawDate !== 'N/A') {
                    const parsedDate = new Date(targetRawDate);
                    if (!isNaN(parsedDate.getTime())) {
                        const day = parsedDate.getDate();
                        const monthNames = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec"];
                        const month = monthNames[parsedDate.getMonth()];
                        formattedDateStr = `${day} ${month}`;
                    }
                }

                // Map target parameters straight into downstream elements
                document.getElementById('outShoulder').textContent = targetShoulder;
                document.getElementById('outDate').textContent = formattedDateStr;

                // Fire rendering pipelines safely
                renderPrescriptionContent(cachedPrescriptionRecord);
            }
        });

        function loadDataFromMemory() {
            const activeSessionItem = localStorage.getItem('currentPrescription');
            const index = localStorage.getItem('currentPrescriptionIndex');
            const prescriptions = JSON.parse(localStorage.getItem('prescriptions') || '[]');
            
            if (activeSessionItem) {
                cachedPrescriptionRecord = JSON.parse(activeSessionItem);
            }
            else if (index !== null && prescriptions[parseInt(index, 10)]) {
                cachedPrescriptionRecord = prescriptions[parseInt(index, 10)];
            } 
            else if (localStorage.getItem('prescriptionDate') || localStorage.getItem('patientName')) {
                cachedPrescriptionRecord = {
                    date: localStorage.getItem('prescriptionDate'),
                    mrd: localStorage.getItem('prescriptionMrd'),
                    name: localStorage.getItem('patientName'),
                    hc: localStorage.getItem('labHc'),
                    fe: localStorage.getItem('labFe'),
                    vitd: localStorage.getItem('labVitD'),
                    shoulder: localStorage.getItem('selectShoulder'),
                    annualFollowUpDate: localStorage.getItem('selectDate')
                };
            }
            else if (prescriptions.length > 0) {
                cachedPrescriptionRecord = prescriptions[0];
            }
            else {
                cachedPrescriptionRecord = {
                    date: new Date().toISOString(),
                    mrd: "MRD-PREVIEW",
                    name: "Sample History Record",
                    hc: "6.5",
                    fe: "15",
                    vitd: "8",
                    shoulder: "Left",
                    annualFollowUpDate: "2026-10-30"
                };
            }
        }

        function generateMedications(prescription) {
            const medications = [];
            
            const hc = parseFloat(prescription.hc !== undefined && prescription.hc !== 'N/A' ? prescription.hc : prescription.hcValue);
            const fe = parseFloat(prescription.fe !== undefined && prescription.fe !== 'N/A' ? prescription.fe : prescription.feValue);
            const vitd = parseFloat(prescription.vitd !== undefined && prescription.vitd !== 'N/A' ? prescription.vitd : prescription.vitdValue);

            // HC Logic
            if (!isNaN(hc)) {
                if (hc >= 7 && hc <= 19) {
                    medications.push({ 
                        name: "subneuro B6 / Matilda forte / ME 12 OD", 
                        dosageEn: "once in a day after dinner", dosageMr: "दिवसातून एकदा रात्रीच्या जेवणानंतर", 
                        durationEn: "Forever", durationMr: "नेहमी" 
                    });
                    medications.push({ 
                        name: "Supracal / Celol / Xtracal", 
                        dosageEn: "once in a day after dinner", dosageMr: "दिवसातून एकदा रात्रीच्या जेवणानंतर", 
                        durationEn: "Forever", durationMr: "नेहमी" 
                    });
                } else if (hc > 20) {
                    medications.push({ 
                        name: "Inj. Nervijen 1500 plus", 
                        dosageEn: "Once a week", dosageMr: "आठवड्यातून एकदा", 
                        durationEn: "For 6 weeks. Then start following tablet", durationMr: "६ आठवड्यांसाठी. नंतर खालील गोळी सुरू करणे" 
                    });
                    medications.push({ 
                        name: "subneuro B6 / Matilda forte / ME 12 OD", 
                        dosageEn: "once in a day after dinner", dosageMr: "दिवसातून एकदा रात्रीच्या जेवणानंतर", 
                        durationEn: "Forever", durationMr: "नेहमी" 
                    });
                }
            }

            // Fe Logic
            if (!isNaN(fe)) {
                if (fe <= 20) {
                    medications.push({ 
                        name: "Inj. Irny 1 gm / Ferium 1 gm", 
                        dosageEn: "Once in 15 days", dosageMr: "१५ दिवसांतून एकदा", 
                        durationEn: "3 doses. Then start following tablet", durationMr: "३ डोस. नंतर खालील गोळी सुरू करणे" 
                    });
                    medications.push({ 
                        name: "orofer XT / livogen / Autrin", 
                        dosageEn: "Alternate day", dosageMr: "एक दिवसा आड", 
                        durationEn: "12 months", durationMr: "१२ महिन्यांसाठी" 
                    });
                } else if (fe > 20 && fe < 30) {
                    medications.push({ 
                        name: "Inj. Irny 1 gm / Ferium 1 gm", 
                        dosageEn: "Once in 15 days", dosageMr: "१५ दिवसांतून एकदा", 
                        durationEn: "2 doses. Then start following tablet", durationMr: "२ डोस. नंतर खालील गोळी सुरू करणे" 
                    });
                    medications.push({ 
                        name: "orofer XT / livogen / Autrin", 
                        dosageEn: "Alternate day", dosageMr: "एक दिवसा आड", 
                        durationEn: "12 months", durationMr: "१२ महिन्यांसाठी" 
                    });
                } else if (fe >= 30) {
                    medications.push({ 
                        name: "orofer XT / livogen / Autrin", 
                        dosageEn: "Alternate day", dosageMr: "एक दिवसा आड", 
                        durationEn: "Forever", durationMr: "नेहमी" 
                    });
                }
            }

            // Vit D Logic
            if (!isNaN(vitd)) {
                if (vitd <= 10) {
                    medications.push({ 
                        name: "Inj. Arachitol 6 LU", 
                        dosageEn: "Once a week", dosageMr: "आठवड्यातून एकदा", 
                        durationEn: "For 5 weeks. Then start following tablet", durationMr: "५ आठवड्यांसाठी. नंतर खालील गोळी सुरू करणे" 
                    });
                    medications.push({ 
                        name: "Uprise/Tayo 60k", 
                        dosageEn: "Once a month", dosageMr: "महिन्यातून एकदा", 
                        durationEn: "Forever", durationMr: "नेहमी" 
                    });
                } else if (vitd > 10 && vitd < 20) {
                    medications.push({ 
                        name: "Inj. Arachitol 6 LU", 
                        dosageEn: "Once a week", dosageMr: "आठवड्यातून एकदा", 
                        durationEn: "For 3 weeks. Then start following tablet", durationMr: "३ आठवड्यांसाठी. नंतर खालील गोळी सुरू करणे" 
                    });
                    medications.push({ 
                        name: "Uprise/Tayo 60k", 
                        dosageEn: "Once a month", dosageMr: "महिन्यातून एकदा", 
                        durationMr: "नेहमी", durationEn: "Forever" 
                    });
                } else if (vitd >= 20) {
                    medications.push({ 
                        name: "Inj. Arachitol 6 LU", 
                        dosageEn: "Single Dose", dosageMr: "एकदा", 
                        durationEn: "Then start following tablet", durationMr: "नंतर खालील गोळी सुरू करणे" 
                    });
                    medications.push({ 
                        name: "Uprise/Tayo 60k", 
                        dosageEn: "Once a month", dosageMr: "महिन्यातून एकदा", 
                        durationEn: "Forever", durationMr: "नेहमी" 
                    });
                }
            }

            if (medications.length === 0) {
                medications.push({ 
                    name: "No therapeutic modifications required", 
                    dosageEn: "-", dosageMr: "-", 
                    durationEn: "Routine review", durationMr: "नियमित तपासणी" 
                });
            }

            return medications;
        }

        function renderPrescriptionContent(prescription) {
            const rawDate = prescription.date || prescription.visitDate;
            document.getElementById('prescriptionDate').textContent = rawDate ? new Date(rawDate).toLocaleDateString('en-GB') : '-';
            document.getElementById('prescriptionMrd').textContent = prescription.mrd || prescription.patientMrd || 'N/A';
            document.getElementById('patientName').textContent = prescription.name || prescription.patientName || 'N/A';
            
            const hcVal = prescription.hc !== 'N/A' ? (prescription.hc || prescription.hcValue || '-') : '-';
            const feVal = prescription.fe !== 'N/A' ? (prescription.fe || prescription.feValue || '-') : '-';
            const vitdVal = prescription.vitd !== 'N/A' ? (prescription.vitd || prescription.vitdValue || '-') : '-';

            document.getElementById('labHc').textContent = hcVal !== '-' ? `${hcVal} g/dL` : '-';
            document.getElementById('labFe').textContent = feVal !== '-' ? `${feVal} ng/mL` : '-';
            document.getElementById('labVitD').textContent = vitdVal !== '-' ? `${vitdVal} ng/mL` : '-';
            
            const meds = generateMedications(prescription);
            const container = document.getElementById('medicationRows');
            
            let htmlOutput = "";
            let bulletNumber = 1;
            let skipNextBullet = false;

            meds.forEach((med) => {
                const dosageString = `${med.dosageEn} <span class="marathi-text">(${med.dosageMr})</span>`;
                const durationString = `${med.durationEn} <span class="marathi-text">(${med.durationMr})</span>`;

                if (skipNextBullet) {
                    htmlOutput += `
                        <div class="medication-entry-indent">
                            <strong>${med.name}</strong> — ${dosageString} (${durationString})
                        </div>
                    `;
                    skipNextBullet = false;
                } else {
                    htmlOutput += `
                        <div class="medication-entry">
                            <strong>${bulletNumber}. ${med.name}</strong> — ${dosageString} (${durationString})
                        </div>
                    `;
                    bulletNumber++;
                }

                if (med.durationEn && med.durationEn.toLowerCase().includes("start following tablet")) {
                    skipNextBullet = true;
                }
            });

            container.innerHTML = htmlOutput;
            
            if (prescription.timestamp) {
                document.getElementById('generatedTime').textContent = new Date(prescription.timestamp).toLocaleString('en-GB', { hour12: true });
            } else {
                document.getElementById('generatedTime').textContent = new Date().toLocaleString('en-GB', { hour12: true });
            }
        }

        function printCurrent() {
            // 1. Create a dynamic style element for strict centering and 90% scaling during print
            const printStyle = document.createElement('style');
            printStyle.id = 'dynamic-print-alignment';
            printStyle.innerHTML = `
                @media print {
                    body, .main-container {
                        display: flex !important;
                        justify-content: center !important;
                        align-items: center !important;
                        width: 100% !important;
                    }
                    .prescription-container {
                        margin: 0 auto !important;
                        zoom: 0.9 !important;
                        transform: scale(0.9) !important;
                        transform-origin: top center !important;
                    }
                    .patient-meta-inline {
                        margin: 0 auto !important;
                        align-items: center !important;
                    }

                    @page { 
                        size: A5 !important; 
                        scale : 100%;
                        margin: 0 !important; 
                    }
                }
            `;
            
            // 2. Inject the alignment patch into the head area
            document.head.appendChild(printStyle);
            
            // 3. Trigger the standard hardware print pipeline
            window.print();
            
            // 4. Safely remove the styling rule once control returns to the app viewport
            setTimeout(() => {
                const targetStyle = document.getElementById('dynamic-print-alignment');
                if (targetStyle) {
                    targetStyle.remove();
                }
            }, 500);
        }
    </script>
</body>
