<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediRx - Generate Prescription</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #2e1065 0%, #701a75 40%, #fbcfe8 100%);
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        h2 {
            color: #2e1065;
            margin-bottom: 1.5rem;
            font-weight: 700;
            text-align: center;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        /* Flex rows for combining elements horizontally */
        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4a148c;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(112, 26, 117, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            font-family: inherit;
            color: #111;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            border-color: #701a75;
            box-shadow: 0 0 0 3px rgba(112, 26, 117, 0.15);
        }
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #701a75 0%, #2e1065 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 16, 101, 0.3);
        }
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #701a75;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .nav-back:hover {
            text-decoration: underline;
        }
        @media (max-width: 576px) {
            .form-row {
                flex-direction: column;
                gap: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="ipd.html" class="nav-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <h2>Create Prescription</h2>
        <form id="prescriptionForm">
            
            <!-- Patient Name & MRD Number in One Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="patientName">Patient Name</label>
                    <input type="text" id="patientName" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="patientMrd">MRD Number</label>
                    <input type="text" id="patientMrd" required placeholder="e.g., MRD-1042">
                </div>
            </div>

            <div class="form-group">
                <label for="visitDate">Visit Date</label>
                <input type="date" id="visitDate" required>
            </div>

            <!-- Three Lab Values in One Horizontal Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="hcValue">HC Value (g/dL)</label>
                    <input type="number" step="0.1" id="hcValue" placeholder="e.g., 14.5">
                </div>
                <div class="form-group">
                    <label for="feValue">Fe Value (ng/mL)</label>
                    <input type="number" step="0.1" id="feValue" placeholder="e.g., 25.0">
                </div>
                <div class="form-group">
                    <label for="vitdValue">Vitamin D (ng/mL)</label>
                    <input type="number" step="0.1" id="vitdValue" placeholder="e.g., 12.4">
                </div>
            </div>

            <div class="form-group">
                <label for="shoulderValue">Shoulder Evaluation Target</label>
                <select id="shoulderValue">
                    <option value="Left">Left Shoulder</option>
                    <option value="Right">Right Shoulder</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="annualFollowUpDate">Target Follow-Up Date</label>
                <input type="date" id="annualFollowUpDate">
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-file-medical"></i> Generate Document
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('visitDate').valueAsDate = new Date();
        });

        document.getElementById('prescriptionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const submissionData = {
                id: 'rx_' + Date.now(),
                name: document.getElementById('patientName').value.trim(),
                mrd: document.getElementById('patientMrd').value.trim(),
                date: document.getElementById('visitDate').value,
                hc: document.getElementById('hcValue').value || 'N/A',
                fe: document.getElementById('feValue').value || 'N/A',
                vitd: document.getElementById('vitdValue').value || 'N/A',
                shoulderValue: document.getElementById('shoulderValue').value,
                annualFollowUpDate: document.getElementById('annualFollowUpDate').value || 'N/A',
                timestamp: new Date().toISOString()
            };

            localStorage.setItem('currentPrescription', JSON.stringify(submissionData));

            const historyLog = JSON.parse(localStorage.getItem('prescriptions') || '[]');
            historyLog.unshift(submissionData);
            localStorage.setItem('prescriptions', JSON.stringify(historyLog));

            window.location.href = 'ipdview.html';
        });
    </script>
</body>
</html>
